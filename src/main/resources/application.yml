data:
  document-paths: data/layer1_faq,data/layer2_policies/current
  chatlog-path: data/layer3_chatlogs
  vector-store-path: data/vector-store.json

spring:
  application:
    name: spring-ai-bootcamp-basic
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4.1-nano
          temperature: 0.1
      embedding:
        options:
          model: text-embedding-3-small
