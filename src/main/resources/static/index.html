<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cholog 고객 상담</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .chat-container {
      width: 420px;
      height: 680px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      background: #1a73e8;
      color: #fff;
      padding: 18px 20px;
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .chat-header .dot {
      width: 8px;
      height: 8px;
      background: #69f0ae;
      border-radius: 50%;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 80%;
    }

    .message.user {
      align-self: flex-end;
      align-items: flex-end;
    }

    .message.ai {
      align-self: flex-start;
      align-items: flex-start;
    }

    .bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user .bubble {
      background: #1a73e8;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.ai .bubble {
      background: #f1f3f4;
      color: #202124;
      border-bottom-left-radius: 4px;
    }

    .token-info {
      font-size: 11px;
      color: #9aa0a6;
      margin-top: 4px;
      padding: 0 4px;
    }

    /* 로딩 점 애니메이션 */
    .loading-bubble {
      background: #f1f3f4;
      padding: 14px 18px;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .loading-bubble span {
      width: 7px;
      height: 7px;
      background: #9aa0a6;
      border-radius: 50%;
      animation: bounce 1.2s infinite ease-in-out;
    }

    .loading-bubble span:nth-child(2) { animation-delay: 0.2s; }
    .loading-bubble span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }

    .input-area {
      border-top: 1px solid #e8eaed;
      padding: 12px 16px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      border: 1px solid #dadce0;
      border-radius: 20px;
      padding: 10px 16px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      max-height: 120px;
      line-height: 1.4;
      transition: border-color 0.2s;
    }

    textarea:focus { border-color: #1a73e8; }

    button {
      width: 40px;
      height: 40px;
      background: #1a73e8;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    button:hover { background: #1557b0; }
    button:disabled { background: #dadce0; cursor: not-allowed; }

    button svg { width: 18px; height: 18px; fill: #fff; }
  </style>
</head>
<body>
<div class="chat-container">
  <div class="chat-header">
    <div class="dot"></div>
    Cholog 고객 상담
  </div>

  <div class="messages" id="messages">
    <div class="message ai">
      <div class="bubble">안녕하세요! Cholog 고객 상담 AI입니다. 무엇이든 물어보세요 😊</div>
    </div>
  </div>

  <div class="input-area">
    <textarea id="input" placeholder="메시지를 입력하세요..." rows="1"></textarea>
    <button id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const conversationId = crypto.randomUUID();

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = inputEl.scrollHeight + 'px';
  });

  function appendMessage(role, text) {
    const div = document.createElement('div');
    div.className = `message ${role}`;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    div.appendChild(bubble);
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return bubble;
  }

  function showLoading() {
    const div = document.createElement('div');
    div.className = 'message ai';
    div.id = 'loading';
    div.innerHTML = `<div class="loading-bubble"><span></span><span></span><span></span></div>`;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function hideLoading() {
    const el = document.getElementById('loading');
    if (el) el.remove();
  }

  async function sendMessage() {
    const question = inputEl.value.trim();
    if (!question) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    appendMessage('user', question);
    showLoading();

    try {
      const res = await fetch('/api/chat/stream', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question, conversationId }),
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      let bubble = null;
      let eventName = ''; // 청크 간에 유지되어야 함

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (line.startsWith('event:')) {
            eventName = line.slice(6).trim(); // event 이름은 trim 무방
          } else if (line.startsWith('data:')) {
            const data = line.slice(5); // 공백 제거 금지 — 토큰 앞 공백이 단어 경계
            if (eventName === 'token') {
              if (!bubble) {
                hideLoading();
                bubble = appendMessage('ai', '');
              }
              bubble.textContent += data;
              messagesEl.scrollTop = messagesEl.scrollHeight;
            }
          }
        }
      }
    } catch (e) {
      hideLoading();
      appendMessage('ai', '서버에 연결할 수 없습니다.');
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }
</script>
</body>
</html>
